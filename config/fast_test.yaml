seed: 42
device: "auto"

data:
  dataset: "cifar10"
  data_dir: "./data"
  num_samples: 50
  batch_size: 50

threat_model:
  norm: "Linf"
  epsilon: 0.03137254901960784   # 8/255

enable_single_surrogate_attacks: false

surrogates:
  - name: "Standard"
    source: "robustbench"
    needs_normalize: false

  - name: "cifar10_vgg16_bn"
    source: "chenyaofo"
    needs_normalize: true

targets:
  - name: "Carmon2019Unlabeled"
    source: "robustbench"
    needs_normalize: false

  - name: "Rebuffi2021Fixing_70_16_cutmix_extra"
    source: "robustbench"
    needs_normalize: false

  - name: "Wang2023Better_WRN-70-16"
    source: "robustbench"
    needs_normalize: false

attacks:
  - name: "MIFGSM"
    params:
      steps: 10
      decay: 1.0

  - name: "DIFGSM"
    params:
      steps: 10
      decay: 1.0
      resize_rate: 0.9
      diversity_prob: 1.0

ensemble:
  enabled: true

output:
  results_dir: "./results"
  save_csv: true
  save_plots: true
  save_adv_examples: true

model_dir: "./models"
